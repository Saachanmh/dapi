version: '3.8'

# Définition des réseaux
networks:
  # Réseau pour frontend <-> backend
  app-network:
    driver: bridge
  # Réseau interne pour la base de données (aucun accès externe)
  db-network:
    driver: bridge
    internal: true

services:
  # Service Base de Données MySQL
  db:
    image: mysql:8.0
    container_name: dapi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dapi-mysql-data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - db-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Service Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dapi-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: 3001
    networks:
      - app-network
      - db-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Service Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dapi-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Service de synchronisation initiale des données (run once)
  sync-data:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dapi-sync-data
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      API_BASE_URL: http://backend:3001
    networks:
      - app-network
      - db-network
    command: node scripts/sync-once.js
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3

# Volumes persistents
volumes:
  dapi-mysql-data:
