services:
  db:
    image: mysql:8.4.10
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - dapi-network

  back:
    build: backend
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-saachanmh}/dapi-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
    depends_on:
      - db
    networks:
      - dapi-network
      - proxy-net

  front:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-saachanmh}/dapi-frontend:latest
    restart: unless-stopped
    networks:
      - proxy-net

  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "8081:8080"
    networks:
      - dapi-network

  back-debug:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-saachanmh}/dapi-backend:latest
    profiles: ["dev"]
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
    ports:
      - "3001:3001"
    depends_on:
      - db
    networks:
      - dapi-network

  uptime-kuma:
    image: louislam/uptime-kuma:1
    profiles: ["dev"]
    ports: [ "3002:3001" ]
    volumes:
      - uptime-data:/app/data
    restart: unless-stopped

networks:
  dapi-network:
    name: dapi-network
    driver: bridge
  proxy-net:
    external: true

volumes:
  db_data:
  uptime-data:
